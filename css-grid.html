<!doctype html>
<html>
  <head>
    <title>CSS Grid</title>
  </head>
  <style>
    .one {
      height: 400px;
      width: auto;
      background-color: blue;
      border: 2px solid black;
    }
    .two {
      height: 400px;
      width: auto;
      background-color: rgb(14, 150, 21);
      border: 2px solid black;
    }
    .three {
      height: 400px;
      width: auto;
      background-color: rgb(255, 0, 0);
      border: 2px solid black;
    }
    .main {
      display: grid;
      grid-template-columns: 30% 40% 30%;
      column-gap: 20px;
    }
  </style>
  <body>
    <div class="main">
      <div class="one">1</div>
      <div class="two">2</div>
      <div class="three">3</div>
    </div>
  </body>
</html>
