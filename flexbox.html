<!doctype html>
<html>
  <head>
    <title>Formating Elements</title>
    <style>
      .one {
        width: 200px;
        height: 300px;
      }
      .two {
        width: 200px;
        height: 300px;
        text-align: start;
        padding-left: 300px;
        margin-left: 300px;
      }
      .main {
        display: flex;
        flex-direction: row;
      }
    </style>
  </head>
  <body>
    <div clas="main">
      <div class="one">
        <img
          src="https://rukminim2.flixcart.com/image/775/775/xif0q/mobile/i/q/r/-original-imahfvrmzd46wgw5.jpeg?q=90"
          alt="iPhone 32 GB"
        />
      </div>
      <div class="two">
        <h1>iPhone 32 GB</h1>
        <ul>
          <li>32 GB Storage</li>
          <li>6GB RAM</li>
          <li>5GB support</li>
        </ul>
      </div>
    </div>
    <button>Add to Cart</button>
  </body>
</html>
